        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Figtree:wght@400;500;600&display=swap');

        :root {
          --ink: #34322D;
          --parchment: #F6F4EF;
          --paper: #FEFDFB;
          --ochre: #A98F68;
          --rust: #B0715F;
          --sage: #7E8C74;
          --slate: #8B867D;
          --line: #E9E5DD;
        }
        * { box-sizing: border-box; }
        .app-shell {
          background: var(--parchment);
          min-height: 100vh;
          font-family: 'Figtree', sans-serif;
          color: var(--ink);
          padding: 56px 24px 80px;
          -webkit-font-smoothing: antialiased;
        }
        .mono { font-family: 'Figtree', sans-serif; font-variant-numeric: tabular-nums; letter-spacing: 0.01em; }
        .subtle { color: var(--slate); font-size: 13.5px; line-height: 1.6; font-weight: 400; }
        .small { font-size: 12px; }

        .header {
          max-width: 920px;
          margin: 0 auto;
          text-align: center;
        }
        .header h1 {
          font-family: 'Cormorant Garamond', serif;
          font-weight: 500;
          font-size: 44px;
          margin: 0 0 10px;
          letter-spacing: 0.01em;
          line-height: 1.1;
        }
        .header p {
          margin: 0 auto;
          max-width: 480px;
        }

        .tab-bar {
          max-width: 920px;
          margin: 32px auto 28px;
          display: flex;
          justify-content: center;
          gap: 6px;
          background: var(--paper);
          border: 1px solid var(--line);
          border-radius: 999px;
          padding: 6px;
          width: fit-content;
        }
        .tab-btn {
          font-family: 'Figtree', sans-serif;
          font-size: 13px;
          font-weight: 500;
          letter-spacing: 0.02em;
          padding: 9px 20px;
          background: transparent;
          border: none;
          border-radius: 999px;
          color: var(--slate);
          cursor: pointer;
          display: flex;
          align-items: center;
          gap: 7px;
          transition: background 0.25s ease, color 0.25s ease;
        }
        .tab-btn:hover { color: var(--ink); }
        .tab-btn.active {
          background: var(--ink);
          color: var(--paper);
        }

        .panel {
          max-width: 920px;
          margin: 0 auto;
          background: var(--paper);
          border: 1px solid var(--line);
          border-radius: 24px;
          box-shadow: 0 1px 2px rgba(52,50,45,0.03), 0 16px 40px rgba(52,50,45,0.05);
        }
        .panel-inner { padding: 40px 44px 48px; }
        .panel-heading h2 {
          font-family: 'Cormorant Garamond', serif;
          font-size: 30px;
          font-weight: 500;
          margin: 0 0 6px;
          letter-spacing: 0.005em;
        }
        .panel-heading p { margin: 0 0 26px; }
        .roster-heading { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }

        .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
        .field-label {
          font-family: 'Figtree', sans-serif;
          font-size: 10.5px;
          font-weight: 600;
          text-transform: uppercase;
          letter-spacing: 0.1em;
          color: var(--slate);
        }
        input, textarea, select {
          font-family: 'Figtree', sans-serif;
          font-size: 14px;
          padding: 10px 14px;
          border: 1px solid var(--line);
          border-radius: 12px;
          background: var(--paper);
          color: var(--ink);
          resize: vertical;
          transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        input:focus, textarea:focus, select:focus {
          outline: none;
          border-color: var(--ochre);
          box-shadow: 0 0 0 3px rgba(169,143,104,0.15);
        }
        :focus-visible { outline: 2px solid var(--ochre); outline-offset: 2px; }
        input:focus-visible, textarea:focus-visible, select:focus-visible { outline: none; }

        .criteria-grid { max-width: 620px; }
        .criteria-footer {
          display: flex;
          align-items: center;
          justify-content: space-between;
          border-top: 1px solid var(--line);
          padding-top: 20px;
          margin-top: 12px;
        }

        .btn-primary {
          font-family: 'Figtree', sans-serif;
          font-weight: 500;
          font-size: 13.5px;
          letter-spacing: 0.02em;
          background: var(--ink);
          color: var(--paper);
          border: 1px solid var(--ink);
          border-radius: 999px;
          padding: 10px 22px;
          display: inline-flex;
          align-items: center;
          gap: 7px;
          cursor: pointer;
          transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .btn-primary:hover { opacity: 0.88; }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-ghost {
          font-family: 'Figtree', sans-serif;
          font-size: 13px;
          font-weight: 500;
          background: transparent;
          border: 1px solid var(--line);
          border-radius: 999px;
          padding: 9px 18px;
          display: inline-flex;
          align-items: center;
          gap: 6px;
          cursor: pointer;
          color: var(--ink);
          transition: border-color 0.2s ease, background 0.2s ease;
        }
        .btn-ghost:hover { border-color: var(--slate); background: rgba(52,50,45,0.02); }
        .btn-ghost.danger { color: var(--rust); border-color: rgba(176,113,95,0.4); }
        .btn-ghost.danger:hover { border-color: var(--rust); background: rgba(176,113,95,0.05); }
        .card-footer-actions .btn-ghost.danger { margin-top: 0; }

        .filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
        .chip {
          font-family: 'Figtree', sans-serif;
          font-size: 12px;
          font-weight: 500;
          border: 1px solid var(--line);
          background: transparent;
          border-radius: 999px;
          padding: 6px 14px;
          cursor: pointer;
          color: var(--slate);
          transition: all 0.2s ease;
        }
        .chip:hover { color: var(--ink); border-color: var(--slate); }
        .chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

        .add-form {
          border: 1px solid var(--line);
          border-radius: 18px;
          padding: 22px 24px 14px;
          margin-bottom: 24px;
          background: var(--parchment);
        }
        .add-form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
        .roster-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .bulk-preview {
          border: 1px solid var(--line);
          border-radius: 14px;
          background: var(--paper);
          padding: 12px 16px;
          margin-top: 12px;
          max-height: 220px;
          overflow-y: auto;
        }
        .bulk-preview-row {
          display: grid;
          grid-template-columns: 1.1fr 1.3fr 1.1fr 1.5fr;
          gap: 10px;
          padding: 6px 0;
          border-bottom: 1px solid var(--line);
          align-items: center;
        }
        .bulk-preview-row:last-child { border-bottom: none; }

        .card-list { display: flex; flex-direction: column; gap: 12px; }
        .empty-note { padding: 28px 0; text-align: center; }

        .p-card {
          border: 1px solid var(--line);
          border-radius: 18px;
          background: var(--paper);
          overflow: hidden;
          transition: box-shadow 0.25s ease, border-color 0.25s ease;
        }
        .p-card:hover { box-shadow: 0 4px 16px rgba(52,50,45,0.05); }
        .p-card-top {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 16px 20px;
          cursor: pointer;
          gap: 12px;
        }
        .p-card-id { display: flex; align-items: center; gap: 14px; min-width: 0; }
        .rank-badge {
          font-family: 'Cormorant Garamond', serif;
          font-weight: 600;
          font-size: 17px;
          width: 34px; height: 34px;
          border-radius: 50%;
          background: var(--parchment);
          border: 1px solid var(--line);
          color: var(--ink);
          display: flex; align-items: center; justify-content: center;
          flex-shrink: 0;
        }
        .p-name { font-weight: 600; font-size: 14.5px; letter-spacing: 0.005em; }
        .p-card-stages { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

        .stamp {
          display: inline-block;
          font-family: 'Figtree', sans-serif;
          font-size: 10px;
          font-weight: 600;
          text-transform: uppercase;
          letter-spacing: 0.07em;
          border: 1px solid;
          border-radius: 999px;
          padding: 3px 10px;
          white-space: nowrap;
          background: rgba(255,255,255,0.5);
        }

        .p-card-body { padding: 6px 20px 24px; border-top: 1px solid var(--line); }
        .p-edit-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 12px 18px;
          margin-top: 20px;
        }

        .stage-tracker { margin-top: 18px; display: flex; flex-direction: column; gap: 4px; }
        .stage-row {
          display: flex;
          align-items: center;
          gap: 12px;
          font-size: 13.5px;
          cursor: pointer;
          padding: 8px 12px;
          border-radius: 12px;
          transition: background 0.2s ease;
        }
        .stage-row:hover { background: var(--parchment); }
        .stage-row.no-click { cursor: default; }
        .stage-row.no-click:hover { background: transparent; }
        .stage-row span { flex-shrink: 0; }
        .inline-date {
          margin-left: auto;
          font-size: 12px;
          padding: 5px 10px;
          border-radius: 999px;
        }

        .cal-shell { display: grid; grid-template-columns: 1.3fr 1fr; gap: 32px; }
        .cal-nav {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 14px;
          font-size: 13.5px;
          font-weight: 500;
        }
        .cal-nav .btn-ghost { padding: 7px 12px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-dow {
          font-family: 'Figtree', sans-serif;
          font-size: 10.5px;
          font-weight: 600;
          letter-spacing: 0.08em;
          text-align: center;
          color: var(--slate);
          padding-bottom: 6px;
        }
        .cal-cell {
          min-height: 66px;
          border: 1px solid var(--line);
          border-radius: 12px;
          padding: 6px 7px;
          font-size: 11px;
          background: var(--paper);
        }
        .cal-cell.empty { border-color: transparent; background: transparent; }
        .cal-daynum { font-size: 10.5px; color: var(--slate); font-weight: 500; }
        .cal-pill {
          background: var(--ink);
          color: var(--paper);
          border-radius: 999px;
          padding: 2px 8px;
          margin-top: 4px;
          font-size: 10px;
          font-weight: 500;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
          cursor: pointer;
          transition: opacity 0.2s ease;
        }
        .cal-pill:hover { opacity: 0.85; }
        .cal-pill.selected { outline: 2px solid var(--ink); outline-offset: 1.5px; }
        .cal-list h3 {
          font-family: 'Cormorant Garamond', serif;
          font-size: 21px;
          font-weight: 500;
          margin: 0 0 14px;
        }
        .cal-list-row {
          display: grid;
          grid-template-columns: 64px 1fr auto auto;
          align-items: center;
          gap: 10px;
          padding: 10px 10px;
          border-bottom: 1px solid var(--line);
          cursor: pointer;
          border-radius: 12px;
          transition: background 0.2s ease;
        }
        .cal-list-row:hover { background: var(--parchment); }
        .cal-list-row.selected { background: rgba(169,143,104,0.1); border-bottom-color: var(--ochre); }
        .cal-list-date { font-size: 11.5px; color: var(--slate); }

        .detail-panel {
          margin-top: 28px;
          border: 1px solid var(--line);
          border-radius: 20px;
          padding: 24px 28px;
          background: var(--parchment);
          box-shadow: 0 1px 2px rgba(52,50,45,0.03);
        }
        .detail-panel-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
        .detail-stamps { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
        .detail-grid {
          display: grid;
          grid-template-columns: repeat(2, minmax(140px, 1fr));
          gap: 16px;
          margin-bottom: 18px;
        }
        .detail-value { font-size: 14px; margin-top: 3px; }
        .detail-block { margin-bottom: 18px; }
        .detail-notes { font-size: 13.5px; line-height: 1.6; margin: 8px 0 0; white-space: pre-wrap; }
        .detail-answers { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .detail-answer-row {
          display: flex;
          justify-content: space-between;
          gap: 12px;
          padding: 7px 0;
          border-bottom: 1px solid var(--line);
        }
        .detail-answer-row:last-child { border-bottom: none; }
        .detail-answer-value { font-size: 13px; font-weight: 500; text-align: right; }
        .detail-answer-bad .detail-answer-value { color: var(--rust); }

        .q-section { margin-bottom: 32px; }

          align-items: baseline;

          margin-bottom: 14px;

        .q-section-head h3 {

          font-size: 22px;
          font-weight: 500;
          margin: 0;

        .q-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; }

          background: var(--paper);
          padding: 18px 20px;

        .q-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }

          font-weight: 500;

          border: none;

          border-radius: 999px;

          color: var(--slate);

        .cat-btn.active { background: var(--ink); color: var(--paper); }
        .segment-btn {

          font-weight: 600;

          cursor: pointer;

          background: transparent;
          color: var(--slate);

          transition: all 0.2s ease;

        .qualify-btn.qualifies,

          font-size: 9.5px;

          display: inline-block;
          font-family: 'Figtree', sans-serif;
          font-size: 9.5px;
          font-weight: 600;
          letter-spacing: 0.06em;
          text-transform: uppercase;
          color: var(--ochre);
          border: 1px solid rgba(169,143,104,0.5);
          background: rgba(169,143,104,0.07);
          border-radius: 999px;
          padding: 2px 8px;
          margin-left: 8px;
          vertical-align: middle;
        }
        .interview-time-section {
          border: 1px solid var(--line);
          border-radius: 16px;
          padding: 16px 18px 18px;
          margin-bottom: 18px;
          background: var(--parchment);
        }
        .interview-time-section .field { margin-bottom: 0; max-width: 300px; }
        .card-footer-actions {

          justify-content: space-between;

          margin-top: 22px;
          padding-top: 18px;
          border-top: 1px solid var(--line);
