        @import url('https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

        :root {
          --ink: #23303B;
          --parchment: #ECE7DA;
          --paper: #F8F5EC;
          --ochre: #B0812C;
          --rust: #A24D3F;
          --sage: #5F7A5E;
          --slate: #63707A;
          --line: #D9D0BC;
        }
        .app-shell {
          background: var(--parchment);
          min-height: 100vh;
          font-family: 'Inter', sans-serif;
          color: var(--ink);
          padding: 32px 24px 60px;
        }
        .mono { font-family: 'IBM Plex Mono', monospace; }
        .subtle { color: var(--slate); font-size: 13.5px; line-height: 1.5; }
        .small { font-size: 12px; }

        .header {
          max-width: 980px;
          margin: 0 auto 8px;
        }
        .header h1 {
          font-family: 'Lora', serif;
          font-weight: 600;
          font-size: 28px;
          margin: 0 0 4px;
          letter-spacing: -0.01em;
        }
        .header p { margin: 0; }

        .tab-bar {
          max-width: 980px;
          margin: 24px auto 0;
          display: flex;
          gap: 4px;
        }
        .tab-btn {
          font-family: 'IBM Plex Mono', monospace;
          font-size: 12.5px;
          letter-spacing: 0.03em;
          text-transform: uppercase;
          padding: 10px 18px 12px;
          background: #E3DCC9;
          border: 1px solid var(--line);
          border-bottom: none;
          border-radius: 8px 8px 0 0;
          color: var(--slate);
          cursor: pointer;
          display: flex;
          align-items: center;
          gap: 6px;
          transform: translateY(2px);
        }
        .tab-btn.active {
          background: var(--paper);
          color: var(--ink);
          transform: translateY(0);
          box-shadow: 0 -2px 0 rgba(0,0,0,0.02);
        }

        .panel {
          max-width: 980px;
          margin: 0 auto;
          background: var(--paper);
          border: 1px solid var(--line);
          border-radius: 0 10px 10px 10px;
          box-shadow: 0 8px 24px rgba(35,48,59,0.06);
        }
        .panel-inner { padding: 28px 32px 36px; }
